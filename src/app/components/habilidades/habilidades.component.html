<section class="section" id="habilidades">
  <p class="section-label">habilidades</p>
  <h2 class="section-title">Stack tecnológico</h2>

  <div class="skills-grid">
    @for (categoria of categorias; track categoria.nombre) {
      <div class="skill-card">
        <p class="skill-category">{{ categoria.nombre }}</p>
        <div class="skill-tags">
          @for (tech of categoria.techs; track tech) {
            <span class="skill-tag">{{ tech }}</span>
          }
        </div>
      </div>
    }
  </div>
</section>

<div class="divider"></div>
