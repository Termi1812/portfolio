<section class="hero" id="hero">
  <div class="hero-content">
    <div class="hero-badge">{{ idiomaService.t.hero.badge }}</div>
    <h1>{{ idiomaService.t.hero.saludo }} <span class="gradient-text">Aritz Ciriza</span></h1>
    <p class="hero-subtitle">{{ idiomaService.t.hero.subtitulo }}</p>
    <p class="hero-location">
      <span class="location-dot"></span>
      Pamplona, Navarra, España
    </p>
    <div class="hero-btns">
      <button class="btn-primary" (click)="scrollTo('proyectos')">{{ idiomaService.t.hero.verProyectos }}</button>
      <button class="btn-secondary" (click)="scrollTo('contacto')">{{ idiomaService.t.hero.contactar }}</button>
    </div>
  </div>
  <div class="hero-glow glow-left"></div>
  <div class="hero-glow glow-right"></div>
</section>
