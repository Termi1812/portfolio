<section class="section" id="proyectos">
  <p class="section-label">proyectos</p>
  <h2 class="section-title">Proyectos destacados</h2>

  <div class="proyectos-grid">
    @for (proyecto of proyectos; track proyecto.nombre) {
      <div class="proyecto-card">
        <div class="proyecto-header">
          <span class="proyecto-icono">{{ proyecto.icono }}</span>
          @if (proyecto.url) {
            <a [href]="proyecto.url" target="_blank" class="proyecto-link">ver proyecto →</a>
          }
        </div>
        <h3 class="proyecto-nombre">{{ proyecto.nombre }}</h3>
        <p class="proyecto-desc">{{ proyecto.descripcion }}</p>
        <div class="proyecto-tags">
          @for (tech of proyecto.techs; track tech) {
            <span class="proyecto-tag">{{ tech }}</span>
          }
        </div>
      </div>
    }
  </div>
</section>

<div class="divider"></div>
